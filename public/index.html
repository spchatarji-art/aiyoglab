/* ─── API CALL (via local server — no CORS!) ─────────── */
async function callAI(msgs, sys="", apiKey="", retries=3){
  for(let i=0;i<retries;i++){
    try{
      const r=await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:msgs,system:sys,apiKey,max_tokens:2000})
      });
      const d=await r.json();
      if(d.error) return `❌ ${d.error.message||d.error}`;
      return d.content?.[0]?.text||"No response.";
    }catch(e){
      if(i===retries-1)return"❌ Connection error. Make sure the server is running.";
      await new Promise(x=>setTimeout(x,2000));
    }
  }
}

/* ─── VOICE ──────────────────────────────────────────── */
function useVoice(){
  const[listening,setL]=useState(false);
  const[speaking,setSp]=useState(false);
  const start=useCallback(cb=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice not supported. Use Chrome.");return;}
    const r=new SR();r.lang='en-IN';
    r.onstart=()=>setL(true);r.onend=()=>setL(false);
    r.onresult=e=>cb(e.results[0][0].transcript);
    r.onerror=()=>setL(false);r.start();
  },[]);
  const speak=useCallback(t=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t.slice(0,400));
    u.rate=0.88;u.pitch=0.82;
    u.onstart=()=>setSp(true);u.onend=()=>setSp(false);
    window.speechSynthesis.speak(u);
  },[]);
  const stop=useCallback(()=>{window.speechSynthesis?.cancel();setSp(false);},[]);
  return{listening,speaking,start,speak,stop};
}

function AuthScreen({onLogin}){
  const[mode,setMode]=useState("login"); // login | register
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  // Google Sign-In callback
  useEffect(()=>{
    window.handleGoogleSignIn=(response)=>{
      try{
        const payload=JSON.parse(atob(response.credential.split('.')[1]));
        const user={name:payload.name,email:payload.email,avatar:payload.picture,provider:"google",id:payload.sub};
        LS.set("ayl_user",user);
        onLogin(user);
      }catch(e){setErr("Google sign-in failed. Try email login.");}
    };
    if(window.google&&GOOGLE_CLIENT_ID!=="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"){
      window.google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:window.handleGoogleSignIn});
      window.google.accounts.id.renderButton(document.getElementById('g-btn'),{theme:'filled_black',size:'large',shape:'pill',text:'continue_with'});
    }
  },[]);

  const submit=()=>{
    if(!email.trim()){setErr("Email required");return;}
    if(mode==="register"&&!name.trim()){setErr("Name required");return;}
    setLoading(true);
    // Simulate auth (stored locally)
    setTimeout(()=>{
      const users=LS.get("ayl_users",[]);
      if(mode==="login"){
        const found=users.find(u=>u.email===email);
        if(!found){setErr("Account not found. Please register.");setLoading(false);return;}
        LS.set("ayl_user",found);
        onLogin(found);
      }else{
        if(users.find(u=>u.email===email)){setErr("Email already registered.");setLoading(false);return;}
        const user={name,email,id:Date.now().toString(),provider:"email",avatar:null};
        LS.set("ayl_users",[...users,user]);
        LS.set("ayl_user",user);
        onLogin(user);
      }
      setLoading(false);
    },600);
  };

  return(
    <div style={{minHeight:"100vh",background:"#040d1a",backgroundImage:HEX_BG,display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      {[180,320,460].map(s=>(
        <div key={s} style={{position:"absolute",width:s,height:s,border:"1px solid rgba(0,212,255,0.05)",borderRadius:"50%",top:"50%",left:"50%",transform:"translate(-50%,-50%)",animation:`glow ${2+s/100}s ease infinite`}}/>
      ))}
      <HUD style={{width:"100%",maxWidth:420,padding:36,position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div className="float-anim" style={{fontSize:48,marginBottom:12}}>⚡</div>
          <div style={{fontFamily:"Orbitron",fontSize:22,fontWeight:900,background:"linear-gradient(135deg,#00d4ff,#00ff88)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>AI YOG LAB</div>
          <div style={{fontFamily:"Orbitron",fontSize:9,color:"#00d4ff66",letterSpacing:4}}>WORLD SUPER APP</div>
        </div>

        {/* Google Sign-In */}
        <div id="g-btn" style={{display:"flex",justifyContent:"center",marginBottom:16,minHeight:40}}/>
        {GOOGLE_CLIENT_ID==="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"&&(
          <div style={{textAlign:"center",color:"#3a5a7a",fontSize:11,marginBottom:16,fontFamily:"Orbitron",letterSpacing:1}}>— OR CONTINUE WITH EMAIL —</div>
        )}
        {GOOGLE_CLIENT_ID!=="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"&&(
          <div style={{textAlign:"center",color:"#3a5a7a",fontSize:11,marginBottom:12}}>— or use email —</div>
        )}

        {/* Tabs */}
        <div style={{display:"flex",gap:4,marginBottom:18,background:"rgba(0,8,20,0.5)",padding:3,borderRadius:5}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:"7px",fontFamily:"Orbitron",fontSize:9,letterSpacing:1,cursor:"pointer",borderRadius:4,border:"none",background:mode===m?"rgba(0,212,255,0.15)":"transparent",color:mode===m?"#00d4ff":"#5a8cb0",transition:"all 0.15s"}}>{m==="login"?"SIGN IN":"REGISTER"}</button>
          ))}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          {mode==="register"&&<Inp value={name} onChange={e=>setName(e.target.value)} placeholder="Your name"/>}
          <Inp value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address" type="email"/>
          <Inp value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" type="password" onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>

        {err&&<div style={{padding:"8px 12px",marginBottom:12,background:"rgba(255,51,102,0.08)",border:"1px solid rgba(255,51,102,0.25)",borderRadius:4,fontSize:12,color:"#ff6688"}}>{err}</div>}

        <Btn ch={loading?(mode==="login"?"SIGNING IN...":"CREATING ACCOUNT..."):mode==="login"?"→ SIGN IN":"→ CREATE ACCOUNT"} onClick={submit} disabled={loading} full/>
      </HUD>
    </div>
  );
}

/* ─── API KEY SETUP ──────────────────────────────────── */
function KeySetup({onSave,existing={},onSkip}){
  const[claude,setClaude]=useState(existing.claude||"");
  const[testing,setTesting]=useState(false);
  const[status,setStatus]=useState("");

  const testAndSave=async()=>{
    if(!claude.trim()){setStatus("❌ Claude API key required");return;}
    if(!claude.startsWith("gsk_")){setStatus("❌ Key must start with gsk_");return;}
    setTesting(true);setStatus("⏳ Testing API key...");
    try{
      const r=await fetch('/api/test-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:claude})});
      const d=await r.json();
      if(d.ok){setStatus("✓ API key verified!");setTimeout(()=>onSave({claude}),600);}
      else{setStatus("❌ "+d.error);}
    }catch{setStatus("❌ Server not running. Start with: npm start");}
    setTesting(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"#040d1a",backgroundImage:HEX_BG,display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>

          <div style={{fontSize:36,marginBottom:10}}>🔑</div>

            <label style={{fontFamily:"Orbitron",fontSize:8,color:"#00d4ff",letterSpacing:2}}>GROQ API KEY (FREE) <span style={{color:"#ff3366"}}>*</span></label>

          </div>

          <p style={{fontSize:10,color:"#2a4a6a",marginTop:4}}>Free at console.groq.com · Stored locally · Never shared</p>
        </div>

        {status&&<div style={{padding:"8px 12px",marginBottom:14,background:status.includes("✓")?"rgba(0,255,136,0.07)":"rgba(255,51,102,0.07)",border:`1px solid ${status.includes("✓")?"rgba(0,255,136,0.3)":"rgba(255,51,102,0.25)"}`,borderRadius:4,fontSize:12,color:status.includes("✓")?"#00ff88":"#ff6688"}}>{status}</div>}

              <React.Fragment key={i}>

        </div>
      )}
    </div>
  );
}

/* ─── SETTINGS (with hidden coupon) ─────────────────── */
function SettingsPage({apiKeys,onUpdateKeys,user,plan,onActivateCoupon,coupon}){
  const[showing,setShowing]=useState(false);
  const[couponInput,setCouponInput]=useState("");
  const[couponStatus,setCouponStatus]=useState("");
  const[showCouponField,setShowCouponField]=useState(false);

  const applyCoupon=()=>{
    if(couponInput.trim()===SECRET_COUPON){
      onActivateCoupon();
      setCouponStatus("✓ Code applied! Unlimited access activated!");
      setCouponInput("");
    }else{
      setCouponStatus("❌ Invalid code.");
    }
    setTimeout(()=>setCouponStatus(""),3000);
  };

  return(
    <div style={{padding:22,overflowY:"auto",height:"100%"}}>
      <div style={{marginBottom:16}}><h2 style={{fontFamily:"Orbitron",fontSize:15,color:"#fff",marginBottom:2}}>SETTINGS</h2><p style={{color:"#5a8cb0",fontSize:12}}>Manage keys, account, and preferences</p></div>

      {/* API Keys */}
      <HUD style={{padding:16,maxWidth:540,marginBottom:12}}>
        <div style={{fontFamily:"Orbitron",fontSize:8,color:"#00d4ff",letterSpacing:2,marginBottom:12}}>API KEY</div>
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <label style={{fontFamily:"Orbitron",fontSize:8,color:"#00d4ff",letterSpacing:2}}>GROQ API KEY (FREE)</label>
            <span style={{fontFamily:"Orbitron",fontSize:7,color:apiKeys.claude?"#00ff88":"#ff3366"}}>● {apiKeys.claude?"ACTIVE":"NOT SET"}</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1,padding:"8px 12px",background:"rgba(0,6,18,0.8)",border:"1px solid rgba(0,212,255,0.12)",borderRadius:4,fontSize:12,color:"#3a6080",fontFamily:"Rajdhani"}}>
              {showing&&apiKeys.claude?apiKeys.claude:(apiKeys.claude?"gsk_..."+apiKeys.claude.slice(-8):"Not configured")}
            </div>
            <button onClick={()=>setShowing(!showing)} style={{background:"rgba(0,212,255,0.06)",border:"1px solid rgba(0,212,255,0.18)",color:"#00d4ff",fontFamily:"Orbitron",fontSize:7,padding:"0 10px",cursor:"pointer",borderRadius:3,letterSpacing:1,flexShrink:0}}>{showing?"HIDE":"SHOW"}</button>
          </div>
        </div>
        <Btn ch="🔑 UPDATE API KEY" onClick={onUpdateKeys} col="#00d4ff" sm/>
      </HUD>

      {/* Account */}
      <HUD style={{padding:16,maxWidth:540,marginBottom:12}}>
        <div style={{fontFamily:"Orbitron",fontSize:8,color:"#00d4ff",letterSpacing:2,marginBottom:12}}>ACCOUNT</div>
        {[
          ["Name",user?.name||"—","#c8e8ff"],
          ["Email",user?.email||"—","#c8e8ff"],
          ["Provider",user?.provider||"—","#00d4ff"],
          ["Plan",coupon?"UNLIMITED":plan.toUpperCase(),coupon?"#a855f7":"#00ff88"],
        ].map(([l,v,c])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(0,212,255,0.04)"}}>
            <span style={{fontSize:12,color:"#7a9ec0"}}>{l}</span>
            <span style={{fontFamily:"Orbitron",fontSize:10,color:c}}>{v}</span>
          </div>
        ))}
      </HUD>

      {/* Hidden Coupon — only visible via "Have an activation code?" link */}
      <HUD style={{padding:16,maxWidth:540,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"Orbitron",fontSize:8,color:"#5a8cb0",letterSpacing:2}}>ACTIVATION</div>
          {coupon?<Tag col="#a855f7">✨ UNLIMITED ACTIVE</Tag>:(
            <button onClick={()=>setShowCouponField(!showCouponField)} style={{background:"none",border:"none",color:"#2a4a6a",fontFamily:"Rajdhani",fontSize:11,cursor:"pointer",textDecoration:"underline"}}>Have an activation code?</button>
          )}
        </div>
        {showCouponField&&!coupon&&(
          <div style={{marginTop:10}}>
            <div style={{display:"flex",gap:8}}>
              <input type="password" value={couponInput} onChange={e=>setCouponInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&applyCoupon()} placeholder="Enter code..." style={{flex:1,background:"rgba(0,6,18,0.8)",border:"1px solid rgba(0,212,255,0.14)",color:"#c8e8ff",fontFamily:"Rajdhani",fontSize:13,padding:"8px 10px",borderRadius:4,outline:"none"}}/>
              <Btn ch="APPLY" onClick={applyCoupon} sm/>
            </div>
            {couponStatus&&<div style={{marginTop:7,fontSize:12,color:couponStatus.includes("✓")?"#00ff88":"#ff6688"}}>{couponStatus}</div>}
          </div>
        )}
      </HUD>

      {/* About */}
      <HUD style={{padding:16,maxWidth:540}}>
        <div style={{fontFamily:"Orbitron",fontSize:8,color:"#00d4ff",letterSpacing:2,marginBottom:10}}>ABOUT</div>
        <div style={{fontSize:12,color:"#5a8cb0",lineHeight:1.9}}>
          <div><span style={{color:"#00d4ff"}}>App:</span> AI Yog Lab World Super App</div>
          <div><span style={{color:"#00d4ff"}}>Version:</span> v6 ULTRA FINAL</div>
          <div><span style={{color:"#00d4ff"}}>AI Engine:</span> Claude Sonnet (Anthropic)</div>
          <div><span style={{color:"#00d4ff"}}>Tools:</span> {TOOLS.length}+ AI tools</div>
          <div><span style={{color:"#00d4ff"}}>Agents:</span> {AGENTS.length} AI agents</div>
          <div><span style={{color:"#00d4ff"}}>Builders:</span> {BUILDERS.length} builder engines</div>
          <div style={{marginTop:8,padding:"8px 12px",background:"rgba(0,212,255,0.04)",border:"1px solid rgba(0,212,255,0.1)",borderRadius:4,fontSize:11,color:"#00d4ff"}}>Made with ❤️ by Shaurya — AI Yog Lab India 🇮🇳</div>
        </div>
      </HUD>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
